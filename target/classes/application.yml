quarkus:
  application:
    name: cev-backend
    version: 1.0.0

  http:
    port: 8081
    host: 0.0.0.0
    cors:
      enabled: true
      origins: "http://localhost:3000,http://localhost:5173"
      methods: "GET,POST,PUT,DELETE,OPTIONS"
      headers: "accept,authorization,content-type,x-requested-with"
      access-control-max-age: 24H

  # ===========================
  # BASE DE DONNÉES (MySQL)
  # ===========================
  datasource:
    db-kind: mysql
    username: ${DB_USER:cev_user}
    password: ${DB_PASSWORD:cev_password}
    jdbc:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cev_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  # ===========================
  # LIQUIBASE
  # ===========================
  liquibase:
    migrate-at-start: true
    change-log: db/changelog.xml

  # ===========================
  # MAILER
  # ===========================
  mailer:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    start-tls: REQUIRED
    username: ${MAIL_USER:noreply@monorganisation.ci}
    password: ${MAIL_PASSWORD:changeme}
    from: "CEV <noreply@monorganisation.ci>"

  # ===========================
  # OPENAPI / SWAGGER
  # ===========================
  swagger-ui:
    always-include: true
    path: /swagger-ui

  # ===========================
  # LOGS
  # ===========================
  log:
    level: INFO
    category:
      "com.cev":
        level: DEBUG

# ===========================
# REST CLIENT (API externe)
# ===========================
"%prod":
  quarkus:
    rest-client:
      "com.cev.service.ExternalDataClient":
        url: ${EXTERNAL_API_URL:http://localhost:8090}
        scope: javax.inject.Singleton

# ===========================
# CEV — Paramètres métier
# ===========================
cev:
  organisation:
    nom: "Ministère de l'Éducation Nationale"
    code: MEN-CI
  signature:
    secret: ${CEV_SECRET:cev-secret-key-changez-en-production}
  document:
    base-url: ${CEV_BASE_URL:http://localhost:8080}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:cev-documents}

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: CEV Backend API
          version: 1.0.0
          description: "API de Création, Émission et Vérification de documents signés avec DataMatrix"

---
# ===========================
# PROFIL DEV — MySQL Docker local
# ===========================
"%dev":
  quarkus:
    datasource:
      username: ${DB_USER:cev_user}
      password: ${DB_PASSWORD:cev_password}
      jdbc:
        url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cev_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC"
    hibernate-orm:
      log:
        sql: true
    mailer:
      mock: true
  cev:
    storage:
      endpoint: http://localhost:9000

---
# ===========================
# PROFIL PROD — Votre serveur MySQL existant
# ===========================
"%prod":
  quarkus:
    datasource:
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      jdbc:
        url: "jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=true&requireSSL=false"
    hibernate-orm:
      log:
        sql: false
